<!DOCTYPE html>
<html>
<head>
  <title>Chanakya Pandey | Portfolio</title>

  <style>
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f8f5f0;
      color: #2b2b2b;
    }

    /* NAVBAR */
    nav {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 15px;
      border-bottom: 1px solid #eee;
      z-index: 100;
    }

    nav a {
      text-decoration: none;
      color: #5a3e2b;
      font-weight: 600;
      position: relative;
    }

    nav a::after {
      content: "";
      position: absolute;
      width: 0%;
      height: 2px;
      background: #c89b6d;
      left: 0;
      bottom: -4px;
      transition: 0.3s;
    }

    nav a:hover::after {
      width: 100%;
    }

    header {
      text-align: center;
      padding: 80px 20px;
    }

    .profile-img {
      width: 120px;
      border-radius: 50%;
      border: 3px solid #c89b6d;
    }

    h1 {
      font-size: 42px;
      margin: 15px 0 5px;
      letter-spacing: -1px;
    }

    #typing {
      color: #8b5e3c;
      min-height: 22px;
    }

    .btn {
      margin: 8px;
      padding: 10px 20px;
      border-radius: 30px;
      background: #c89b6d;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #8b5e3c;
      transform: translateY(-2px);
    }

    section {
      max-width: 800px;
      margin: 40px auto;
      padding: 30px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    h2 {
      margin-bottom: 10px;
      color: #5a3e2b;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
      gap: 15px;
    }

    .card {
      padding: 15px;
      border-radius: 12px;
      background: #fafafa;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #777;
    }

    .fade {
      opacity: 0;
      transform: translateY(40px);
      transition: 0.8s;
    }

    .fade.show {
      opacity: 1;
      transform: translateY(0);
    }

  </style>
</head>

<body>

<nav>
  <a href="#about">About</a>
  <a href="#skills">Skills</a>
  <a href="#projects">Projects</a>
  <a href="#contact">Contact</a>
</nav>

<header>
  <img src="chanakya.jpg" class="profile-img">
  <h1>Chanakya Pandey</h1>
  <p id="typing"></p>

  <a href="mailto:chanakyapandey29@gmail.com" class="btn">Contact</a>
  <a href="https://github.com/code-shastra" class="btn" target="_blank">GitHub</a>
</header>

<section id="about" class="fade">
  <h2>About</h2>
  <p>I am a passionate frontend developer and founder of Nestlytics.</p>
</section>

<section id="skills" class="fade">
  <h2>Skills</h2>
  <p>C • Java • HTML • CSS • JavaScript</p>
</section>

<section id="projects" class="fade">
  <h2>Projects</h2>
  <div class="projects">
    <div class="card">
      <h3>Portfolio Website</h3>
      <a href="https://code-shastra.github.io/portfolio/" class="btn">View</a>
    </div>
  </div>
</section>

<section id="contact" class="fade">
  <h2>Contact</h2>
  <p>Email: chanakyapandey29@gmail.com</p>
</section>

<footer>
  © 2026 Chanakya Pandey
</footer>

<script>
const text = "Frontend Developer | Founder @ Nestlytics";
let i = 0;

function typeEffect() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 40);
  }
}
typeEffect();

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("show");
    }
  });
});

document.querySelectorAll(".fade").forEach(el => observer.observe(el));
</script>

</body>
</html>
